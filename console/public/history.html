<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Run History</title>
    <link rel="stylesheet" href="/css/console.css" />
  </head>
  <body class="console-shell">
    <main class="console-layout">
      <section class="console-hero compact">
        <p class="eyebrow">History</p>
        <h1>Recent console runs</h1>
        <p class="hero-copy">A local journal of operator-triggered runs persisted under <code>console/data/</code>.</p>
        <a class="history-link" href="/">Back to launch</a>
      </section>

      <section class="panel">
        <div class="panel-header">
          <p class="eyebrow">Recent runs</p>
          <h2>Status ledger</h2>
        </div>
        <div id="history-table" class="history-table"></div>
      </section>
    </main>

    <script src="/js/app.js" defer></script>
    <script src="/js/history.js" defer></script>
  </body>
  </html>
